<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>World-RTS 全景图</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  --hard:#f0f6fc; --soft:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
body{padding-bottom:64px;}
a{color:var(--accent);text-decoration:none;}

/* 顶栏 */
.topbar{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;}
.topbar h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;}
.topbar h1 .sub{font-size:11px;color:var(--muted);font-weight:400;}
.formula{font-size:11px;color:var(--muted);margin-top:4px;font-family:ui-monospace,Menlo,monospace;}

/* 透明度条 */
.transparency{margin-top:8px;}
.tbar{height:8px;border-radius:4px;background:#21262d;overflow:hidden;display:flex;}
.tbar .hard{background:#2ea043;} .tbar .soft{background:#9e6a03;} .tbar .empty{background:#30363d;}
.tlegend{font-size:10px;color:var(--muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;}
.tlegend b{color:var(--text);font-weight:600;}
.dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle;}

/* 内容容器 */
.wrap{max-width:1400px;margin:0 auto;padding:12px;}

/* 标签页(PC侧栏 / 移动底tab) */
.tabs-desktop{display:none;}
.tab-content{display:none;} .tab-content.active{display:block;}

/* 热力矩阵 */
.matrix-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:8px;background:var(--panel);}
table.matrix{border-collapse:collapse;font-size:11px;width:max-content;min-width:100%;}
table.matrix th,table.matrix td{border:1px solid #21262d;text-align:center;white-space:nowrap;}
table.matrix thead th{position:sticky;top:0;background:var(--panel2);z-index:5;padding:6px 4px;font-weight:500;color:var(--muted);cursor:pointer;height:60px;vertical-align:bottom;}
table.matrix thead th .dname{writing-mode:vertical-lr;display:inline-block;max-height:52px;font-size:10px;letter-spacing:1px;}
table.matrix thead th.corner{writing-mode:horizontal-tb;left:0;z-index:8;position:sticky;background:var(--panel2);}
table.matrix tbody th{position:sticky;left:0;background:var(--panel2);z-index:4;padding:6px 8px;text-align:left;font-weight:500;min-width:78px;}
table.matrix td{width:30px;height:30px;cursor:pointer;color:#0d1117;font-weight:600;transition:outline .1s;}
table.matrix td.empty{background:#161b22;color:#484f58;font-weight:400;cursor:default;}
table.matrix td.empty::after{content:"·";}
table.matrix td:hover{outline:2px solid var(--accent);outline-offset:-2px;}
.layer-sep{border-left:2px solid #3d444d !important;}

/* 阵营榜卡片 */
.cards{display:grid;grid-template-columns:1fr;gap:10px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;}
.card h3{font-size:14px;display:flex;align-items:center;gap:6px;}
.card .empty-note{color:var(--muted);font-size:12px;margin-top:6px;}
.placeholder{border:1px dashed var(--border);border-radius:8px;padding:24px;text-align:center;color:var(--muted);font-size:13px;}

/* 台账 */
table.ledger{width:100%;border-collapse:collapse;font-size:12px;}
table.ledger th,table.ledger td{border-bottom:1px solid var(--border);padding:8px 6px;text-align:left;vertical-align:top;}
table.ledger th{color:var(--muted);font-weight:500;position:sticky;top:0;background:var(--bg);}
table.ledger td.src{color:var(--accent);font-size:11px;}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:#21262d;color:var(--muted);}
.badge.wait{background:#3d2e00;color:#e3b341;}

/* 抽屉 */
.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none;}
.drawer-mask.open{display:block;}
.drawer{position:fixed;z-index:41;background:var(--panel);border:1px solid var(--border);
  right:0;top:0;bottom:0;width:min(420px,92vw);transform:translateX(100%);transition:transform .2s;overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drawer .dh{padding:14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);}
.drawer .dh h2{font-size:15px;} .drawer .dh .close{position:absolute;right:12px;top:12px;font-size:22px;color:var(--muted);cursor:pointer;background:none;border:none;}
.drawer .db{padding:14px;}
.factor{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px;}
.factor.hard{border-left:3px solid #2ea043;}
.factor.soft{border-left:3px solid #9e6a03;}
.factor .fh{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;}
.factor .ftag{font-size:9px;padding:1px 6px;border-radius:8px;}
.factor.hard .ftag{background:#132d1a;color:#3fb950;} .factor.soft .ftag{background:#2d2200;color:#e3b341;}
.factor .fval{font-size:20px;font-weight:700;margin:4px 0;}
.factor .fdesc{font-size:11px;color:var(--muted);line-height:1.5;}
.factor .fsrc{font-size:10px;color:var(--accent);margin-top:4px;}
.wait-box{text-align:center;color:var(--muted);padding:30px 10px;font-size:13px;}

/* 移动底 tab */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--panel);border-top:1px solid var(--border);display:flex;z-index:30;}
.tabbar button{flex:1;background:none;border:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;}
.tabbar button.active{color:var(--accent);}
.tabbar button .ic{font-size:18px;}

/* PC ≥900px */
@media(min-width:900px){
  body{padding-bottom:0;display:grid;grid-template-columns:180px 1fr;grid-template-rows:auto 1fr;min-height:100vh;}
  .topbar{grid-column:1/3;}
  .tabbar{display:none;}
  .tabs-desktop{display:flex;flex-direction:column;gap:4px;padding:14px 8px;border-right:1px solid var(--border);background:var(--panel);}
  .tabs-desktop button{background:none;border:none;color:var(--muted);text-align:left;padding:10px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;gap:8px;align-items:center;}
  .tabs-desktop button.active{background:var(--panel2);color:var(--text);}
  .wrap{grid-column:2;width:100%;}
  .cards{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="topbar">
  <h1>🌍 World-RTS 全景图 <span class="sub" id="metaSub">加载中…</span></h1>
  <div class="formula">瓶颈强度 = 物理缺口 × 战略相关性 × 填补难度 × 安全放大器</div>
  <div class="transparency">
    <div class="tbar"><div class="hard" id="tHard" style="width:0"></div><div class="soft" id="tSoft" style="width:0"></div><div class="empty" id="tEmpty" style="width:100%"></div></div>
    <div class="tlegend" id="tLegend"></div>
  </div>
</div>

<nav class="tabs-desktop">
  <button data-tab="matrix" class="active"><span>🗺</span> 热力矩阵</button>
  <button data-tab="rank"><span>🏆</span> 阵营瓶颈榜</button>
  <button data-tab="flow"><span>💰</span> 资金流指向</button>
  <button data-tab="ledger"><span>📋</span> 数据台账</button>
</nav>

<div class="wrap">
  <div class="tab-content active" id="tab-matrix">
    <div class="matrix-scroll"><table class="matrix" id="matrixTable"></table></div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px;">点任意格子看四因子拆解。颜色越红=瓶颈越强(0–9)。灰点『·』=待采集。</p>
  </div>
  <div class="tab-content" id="tab-rank">
    <div class="cards" id="rankCards"></div>
  </div>
  <div class="tab-content" id="tab-flow">
    <div class="placeholder">💰 资金流指向<br><br>第二阶段功能：每条绑定约束 → 被迫资金流方向。<br>待矩阵灌入硬数据、瓶颈算出后点亮。</div>
  </div>
  <div class="tab-content" id="tab-ledger">
    <div style="overflow-x:auto;"><table class="ledger" id="ledgerTable"></table></div>
  </div>
</div>

<div class="tabbar">
  <button data-tab="matrix" class="active"><span class="ic">🗺</span>矩阵</button>
  <button data-tab="rank"><span class="ic">🏆</span>瓶颈榜</button>
  <button data-tab="flow"><span class="ic">💰</span>资金流</button>
  <button data-tab="ledger"><span class="ic">📋</span>台账</button>
</div>

<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="drawer">
  <div class="dh"><h2 id="drawerTitle"></h2><button class="close" id="drawerClose">×</button></div>
  <div class="db" id="drawerBody"></div>
</aside>

<script>
let DATA=null;

function heatColor(score){
  // 0(绿)→4.5(黄)→9(红)
  if(score==null) return null;
  const t=Math.max(0,Math.min(1,score/9));
  let r,g,b;
  if(t<0.5){const k=t/0.5;r=Math.round(46+(224-46)*k);g=Math.round(160+(190-160)*k);b=Math.round(67+(60-67)*k);}
  else{const k=(t-0.5)/0.5;r=Math.round(224+(248-224)*k);g=Math.round(190+(81-190)*k);b=Math.round(60+(73-60)*k);}
  return `rgb(${r},${g},${b})`;
}

async function load(){
  const r=await fetch('/api/matrix'); DATA=await r.json();
  renderMeta(); renderMatrix(); renderRank(); renderLedger();
}

function renderMeta(){
  const m=DATA.meta, t=DATA.transparency;
  document.getElementById('metaSub').textContent=`v${m.version} · ${m.factions_count}阵营×${m.dimensions_count}维 · 更新 ${m.last_updated}`;
  const total=t.total;
  document.getElementById('tHard').style.width=(t.hard_anchored/total*100)+'%';
  document.getElementById('tSoft').style.width=((t.filled-t.hard_anchored)/total*100)+'%';
  document.getElementById('tEmpty').style.width=(t.empty/total*100)+'%';
  document.getElementById('tLegend').innerHTML=
    `<span><span class="dot" style="background:#2ea043"></span>硬数据 <b>${t.hard_anchored}</b></span>`+
    `<span><span class="dot" style="background:#9e6a03"></span>含赋档 <b>${t.filled-t.hard_anchored}</b></span>`+
    `<span><span class="dot" style="background:#30363d"></span>待采集 <b>${t.empty}</b></span>`+
    `<span>共 ${total} 格 · 已填 <b>${t.fill_pct}%</b></span>`;
}

function renderMatrix(){
  const t=document.getElementById('matrixTable');
  const dims=DATA.dimensions, facs=DATA.factions, cells=DATA.cells||{};
  // 表头
  let thead='<thead><tr><th class="corner">阵营 \\ 维度</th>';
  let lastLayer=null;
  dims.forEach(d=>{
    const sep=(lastLayer&&lastLayer!==d.layer)?' layer-sep':''; lastLayer=d.layer;
    thead+=`<th class="${sep}" title="${d.name} · ${d.source}"><span class="dname">${d.name}</span></th>`;
  });
  thead+='</tr></thead>';
  // 表体
  let tbody='<tbody>';
  facs.forEach(f=>{
    tbody+=`<tr><th>${f.flag} ${f.name}</th>`;
    lastLayer=null;
    dims.forEach(d=>{
      const sep=(lastLayer&&lastLayer!==d.layer)?' layer-sep':''; lastLayer=d.layer;
      const key=`${f.id}::${d.id}`; const c=cells[key];
      if(c&&c.score!=null){
        const col=heatColor(c.score);
        tbody+=`<td class="${sep}" style="background:${col}" data-f="${f.id}" data-d="${d.id}" onclick="openCell('${f.id}','${d.id}')">${c.score.toFixed(1)}</td>`;
      }else{
        tbody+=`<td class="empty${sep}" title="待采集"></td>`;
      }
    });
    tbody+='</tr>';
  });
  tbody+='</tbody>';
  t.innerHTML=thead+tbody;
}

function renderRank(){
  const box=document.getElementById('rankCards');
  const cells=DATA.cells||{};
  if(Object.keys(cells).length===0){
    box.innerHTML=`<div class="placeholder" style="grid-column:1/-1">🏆 阵营瓶颈榜<br><br>每个阵营的 Top 1–2 绑定约束将在此展示。<br>当前矩阵为空，待硬数据灌入后自动生成。</div>`;
    return;
  }
  // 有数据时：按阵营取最高分维度
  let html='';
  DATA.factions.forEach(f=>{
    const rows=DATA.dimensions.map(d=>({d,c:cells[`${f.id}::${d.id}`]})).filter(x=>x.c&&x.c.score!=null).sort((a,b)=>b.c.score-a.c.score).slice(0,2);
    html+=`<div class="card"><h3>${f.flag} ${f.name}</h3>`;
    if(rows.length===0){html+='<div class="empty-note">待采集</div>';}
    else{rows.forEach(x=>{html+=`<div style="margin-top:6px;font-size:13px;">🔴 ${x.d.name} <b>${x.c.score.toFixed(1)}</b></div>`;});}
    html+='</div>';
  });
  box.innerHTML=html;
}

function renderLedger(){
  const t=document.getElementById('ledgerTable');
  let html='<thead><tr><th>维度</th><th>层</th><th>硬指标</th><th>一手源</th><th>状态</th></tr></thead><tbody>';
  const layerName={};DATA.layers.forEach(l=>layerName[l.id]=l.name);
  DATA.dimensions.forEach(d=>{
    html+=`<tr><td><b>${d.name}</b></td><td>${layerName[d.layer]}</td><td style="color:var(--muted)">${d.metric}</td><td class="src">${d.source}</td><td><span class="badge wait">待采集</span></td></tr>`;
  });
  html+='</tbody>';
  t.innerHTML=html;
}

async function openCell(fid,did){
  const r=await fetch(`/api/cell/${fid}/${did}`); const d=await r.json();
  document.getElementById('drawerTitle').textContent=`${d.faction.flag} ${d.faction.name} · ${d.dimension.name}`;
  const body=document.getElementById('drawerBody');
  if(!d.cell){
    body.innerHTML=`<div class="wait-box">📭 该格尚未采集数据<br><br><span style="font-size:11px">硬指标：${d.dimension.metric}<br>一手源：<a href="#">${d.dimension.source}</a></span></div>`;
  }else{
    const c=d.cell;
    const f=(o,cls,tag,name,unit)=>`<div class="factor ${cls}"><div class="fh">${name}<span class="ftag">${tag}</span></div><div class="fval">${o&&o.value!=null?o.value+(unit||''):'—'}</div><div class="fdesc">${o&&o.desc||'—'}</div>${o&&o.source?`<div class="fsrc">来源：${o.source}</div>`:''}</div>`;
    body.innerHTML=
      `<div style="font-size:24px;font-weight:700;margin-bottom:12px">瓶颈强度 ${c.score.toFixed(2)} <span style="font-size:12px;color:var(--muted)">/ 9</span></div>`+
      f(c.physical_gap,'hard','硬数据','① 物理缺口','')+
      f(c.strategic_relevance,'soft','政策判断','② 战略相关性','')+
      f(c.irreplaceability,'soft','半客观','③ 填补难度','')+
      f(c.security_amp,'soft','政策判断','④ 安全放大器','');
  }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerMask').classList.add('open');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerMask').classList.remove('open');}
document.getElementById('drawerClose').onclick=closeDrawer;
document.getElementById('drawerMask').onclick=closeDrawer;

// tab 切换
function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.toggle('active',e.id==='tab-'+name));
  document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
}
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

load();
</script>
</body>
</html>
