<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World-RTS 全景图</title>
<style>
:root{
  --bg:#0a0e14; --panel:#12161f; --panel2:#1a1f2b; --panel3:#212836;
  --border:#232a37; --border2:#2d3543;
  --text:#e8edf4; --muted:#8792a3; --dim:#5a6474; --accent:#5b9dff;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;}
body{padding-bottom:70px;}
a{color:var(--accent);text-decoration:none;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#2d3543;border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- 顶栏 ---------- */
.topbar{position:sticky;top:0;z-index:20;background:rgba(10,14,20,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;}
.topbar h1{font-size:16px;font-weight:650;display:flex;align-items:center;gap:8px;letter-spacing:.3px;}
.topbar h1 .sub{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0;}
.formula{font-size:11px;color:var(--dim);margin-top:5px;font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.2px;}

/* 透明度条 */
.transparency{margin-top:10px;}
.tbar{height:6px;border-radius:6px;background:#1a1f2b;overflow:hidden;display:flex;gap:2px;}
.tbar>div{transition:width .4s ease;}
.tbar .hard{background:linear-gradient(90deg,#2ea043,#3fb950);}
.tbar .soft{background:linear-gradient(90deg,#9e6a03,#d4a017);}
.tbar .empty{background:#232a37;}
.tlegend{font-size:10.5px;color:var(--muted);margin-top:6px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.tlegend b{color:var(--text);font-weight:650;}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:middle;}

/* ---------- 容器 ---------- */
.wrap{max-width:1440px;margin:0 auto;padding:16px;}
.tabs-desktop{display:none;}
.tab-content{display:none;animation:fade .25s ease;}
.tab-content.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ---------- 热力矩阵 ---------- */
.matrix-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:6px;overflow:hidden;}
.matrix-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
table.matrix{border-collapse:separate;border-spacing:3px;font-size:11px;width:max-content;min-width:100%;}

/* 列头 */
table.matrix thead th{position:sticky;top:0;background:var(--panel2);z-index:5;
  padding:8px 3px;font-weight:500;color:var(--muted);cursor:pointer;height:74px;
  vertical-align:bottom;border-radius:8px 8px 0 0;transition:color .15s,background .15s;}
table.matrix thead th:hover{color:var(--text);background:var(--panel3);}
table.matrix thead th .dname{writing-mode:vertical-lr;display:inline-block;max-height:64px;
  font-size:10.5px;letter-spacing:1.5px;line-height:1.1;}
table.matrix thead th.corner{writing-mode:horizontal-tb;left:0;z-index:8;position:sticky;
  background:var(--panel2);color:var(--dim);font-size:10px;font-weight:500;
  border-radius:8px;vertical-align:middle;padding:6px;min-width:82px;}

/* 行头 */
table.matrix tbody th{position:sticky;left:0;background:var(--panel2);z-index:4;
  padding:8px 10px;text-align:left;font-weight:550;min-width:82px;font-size:12px;
  border-radius:8px;white-space:nowrap;}

/* 数据格 */
table.matrix td{width:34px;height:34px;cursor:pointer;color:#08111f;font-weight:700;
  border-radius:7px;font-size:12px;transition:transform .12s ease,box-shadow .12s ease;
  position:relative;}
table.matrix td.filled:hover{transform:scale(1.18);box-shadow:0 0 0 2px var(--accent),0 4px 12px rgba(0,0,0,.5);z-index:3;}
/* 空格：极淡棋盘占位，去噪 */
table.matrix td.empty{background:#161b26;cursor:pointer;}
table.matrix td.empty:hover{background:#1c2230;}
table.matrix td.empty::after{content:"";position:absolute;inset:38%;border-radius:50%;
  background:#28303e;}

/* ---------- 阵营榜 ---------- */
.cards{display:grid;grid-template-columns:1fr;gap:12px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card h3{font-size:14px;display:flex;align-items:center;gap:7px;font-weight:600;}
.card .empty-note{color:var(--dim);font-size:12px;margin-top:8px;}
.placeholder{border:1.5px dashed var(--border2);border-radius:14px;padding:36px 24px;
  text-align:center;color:var(--muted);font-size:13px;line-height:2;background:var(--panel);}
.placeholder .big{font-size:32px;display:block;margin-bottom:10px;opacity:.7;}

/* ---------- 台账 ---------- */
.ledger-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
table.ledger{width:100%;border-collapse:collapse;font-size:12px;}
table.ledger th,table.ledger td{border-bottom:1px solid var(--border);padding:11px 12px;text-align:left;vertical-align:top;}
table.ledger tbody tr:last-child td{border-bottom:none;}
table.ledger tbody tr:hover{background:var(--panel2);}
table.ledger th{color:var(--muted);font-weight:550;position:sticky;top:0;background:var(--panel2);font-size:11px;}
table.ledger td.src{color:var(--accent);font-size:11px;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:#232a37;color:var(--muted);font-weight:500;}
.badge.wait{background:#2e2400;color:#e3b341;}

/* ---------- 抽屉 ---------- */
.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none;backdrop-filter:blur(2px);}
.drawer-mask.open{display:block;}
.drawer{position:fixed;z-index:41;background:var(--panel);border-left:1px solid var(--border2);
  right:0;top:0;bottom:0;width:min(440px,92vw);transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,.4);}
.drawer.open{transform:translateX(0);}
.drawer .dh{padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2;}
.drawer .dh h2{font-size:16px;font-weight:650;}
.drawer .dh .close{position:absolute;right:14px;top:14px;font-size:24px;color:var(--muted);cursor:pointer;background:none;border:none;line-height:1;width:32px;height:32px;border-radius:8px;transition:background .15s;}
.drawer .dh .close:hover{background:var(--panel3);color:var(--text);}
.drawer .db{padding:16px 18px;}
.score-big{font-size:30px;font-weight:750;margin-bottom:16px;display:flex;align-items:baseline;gap:8px;}
.score-big .unit{font-size:13px;color:var(--dim);font-weight:400;}
.factor{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:11px;}
.factor.hard{border-left:3px solid #2ea043;}
.factor.soft{border-left:3px solid #d4a017;}
.factor .fh{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;}
.factor .ftag{font-size:9.5px;padding:2px 8px;border-radius:12px;font-weight:500;}
.factor.hard .ftag{background:#0f2818;color:#3fb950;} .factor.soft .ftag{background:#2a2100;color:#e3b341;}
.factor .fval{font-size:22px;font-weight:750;margin:6px 0 3px;}
.factor .fdesc{font-size:11.5px;color:var(--muted);line-height:1.55;}
.factor .fsrc{font-size:10.5px;color:var(--accent);margin-top:5px;}
.factor .fsrc a{color:var(--accent);}
.bd-table{width:100%;border-collapse:collapse;margin:10px 0 4px;font-size:11px;}
.bd-table th{color:var(--dim);font-weight:500;text-align:right;padding:3px 6px;border-bottom:1px solid var(--border);}
.bd-table th:first-child{text-align:left;}
.bd-table td{text-align:right;padding:4px 6px;border-bottom:1px solid #1a1f2b;color:var(--muted);}
.bd-table td:first-child{text-align:left;color:var(--text);}
.bd-table tr.bd-sum td{border-top:1px solid var(--border2);border-bottom:none;color:var(--text);padding-top:6px;}
.pg-note{font-size:10.5px;color:#d4a017;background:#2a2100;border-radius:6px;padding:5px 8px;margin:6px 0 4px;line-height:1.5;}
.wait-box{text-align:center;color:var(--muted);padding:40px 16px;font-size:13px;line-height:1.9;}
.wait-box .big{font-size:38px;display:block;margin-bottom:14px;opacity:.6;}

/* ---------- 移动底 tab ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:62px;background:rgba(18,22,31,.95);
  backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);}
.tabbar button{flex:1;background:none;border:none;color:var(--muted);font-size:10.5px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:color .15s;}
.tabbar button.active{color:var(--accent);}
.tabbar button .ic{font-size:19px;}
.tabbar button.active .ic{transform:scale(1.1);}

/* ---------- PC ≥900px ---------- */
@media(min-width:900px){
  body{padding-bottom:0;display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr;min-height:100vh;}
  .topbar{grid-column:1/3;}
  .tabbar{display:none;}
  .tabs-desktop{display:flex;flex-direction:column;gap:5px;padding:16px 10px;
    border-right:1px solid var(--border);background:var(--panel);}
  .tabs-desktop button{background:none;border:none;color:var(--muted);text-align:left;
    padding:11px 14px;border-radius:10px;font-size:13px;cursor:pointer;
    display:flex;gap:10px;align-items:center;transition:all .15s;font-weight:500;}
  .tabs-desktop button:hover{background:var(--panel2);color:var(--text);}
  .tabs-desktop button.active{background:var(--panel3);color:var(--text);font-weight:600;}
  .wrap{grid-column:2;width:100%;display:flex;flex-direction:column;}
  #tab-matrix.active{display:flex;flex-direction:column;flex:1;}
  .cards{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
  /* PC 加大格子（固定尺寸，不用100%拉伸——那会把宽度全压到第一列导致能源列被拉宽） */
  table.matrix{border-spacing:4px;font-size:12px;}
  table.matrix td{width:46px;height:46px;font-size:13px;}
  table.matrix thead th{height:86px;}
  table.matrix thead th .dname{max-height:74px;font-size:11px;letter-spacing:2px;}
  table.matrix tbody th{font-size:12.5px;padding:10px 12px;}
}

/* ---------- 底部信息条(填补 PC 空白) ---------- */
.info-strip{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px;}
.info-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.info-card .ic-t{font-size:13px;font-weight:650;display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.info-card .ic-b{font-size:12px;color:var(--muted);line-height:1.75;}
.info-card .ic-b b{color:var(--text);font-weight:600;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin:5px 0;}
.legend-swatch{width:26px;height:14px;border-radius:4px;flex-shrink:0;}
@media(min-width:900px){
  .info-strip{grid-template-columns:repeat(3,1fr);margin-top:18px;}
}

/* ---------- 移动端微调 ---------- */
@media(max-width:600px){
  .wrap{padding:12px;}
  table.matrix td{width:30px;height:30px;font-size:11px;}
  table.matrix thead th{height:66px;}
  table.matrix thead th .dname{max-height:56px;font-size:10px;letter-spacing:1px;}
  table.matrix tbody th,table.matrix thead th.corner{min-width:68px;font-size:11px;padding:6px 7px;}
}
</style>
</head>
<body>
<div class="topbar">
  <h1>🌍 World-RTS 全景图 <span class="sub" id="metaSub">加载中…</span></h1>
  <div class="formula">瓶颈强度 = 物理缺口 × 战略相关性 × 填补难度 × 安全放大器</div>
  <div class="transparency">
    <div class="tbar"><div class="hard" id="tHard" style="width:0"></div><div class="soft" id="tSoft" style="width:0"></div><div class="empty" id="tEmpty" style="width:100%"></div></div>
    <div class="tlegend" id="tLegend"></div>
  </div>
</div>

<nav class="tabs-desktop">
  <button data-tab="matrix" class="active"><span>🗺</span> 热力矩阵</button>
  <button data-tab="rank"><span>🏆</span> 阵营瓶颈榜</button>
  <button data-tab="flow"><span>💰</span> 资金流指向</button>
  <button data-tab="ledger"><span>📋</span> 数据台账</button>
</nav>

<div class="wrap">
  <div class="tab-content active" id="tab-matrix">
    <div class="matrix-card"><div class="matrix-scroll"><table class="matrix" id="matrixTable"></table></div></div>
    <p style="font-size:11px;color:var(--dim);margin-top:10px;line-height:1.6;">点亮的格子可点开看四因子拆解 · 颜色越红=瓶颈越强(0–9) · 空心圆=待采集</p>
    <div class="info-strip">
      <div class="info-card">
        <div class="ic-t">🎨 色阶图例</div>
        <div class="ic-b">
          <div class="legend-row"><span class="legend-swatch" style="background:rgb(46,150,70)"></span>0–3 低瓶颈 · 自给充足</div>
          <div class="legend-row"><span class="legend-swatch" style="background:rgb(214,180,70)"></span>3–6 中瓶颈 · 部分依赖</div>
          <div class="legend-row"><span class="legend-swatch" style="background:rgb(224,88,80)"></span>6–9 高瓶颈 · 生存级卡脖子</div>
        </div>
      </div>
      <div class="info-card">
        <div class="ic-t">🧮 四因子拆解</div>
        <div class="ic-b">
          <b>物理缺口</b> 缺多少（唯一硬数据）<br>
          <b>战略相关性</b> 在乎不在乎补<br>
          <b>填补难度</b> 能不能靠市场填<br>
          <b>安全放大器</b> 会不会不计成本砸钱
        </div>
      </div>
      <div class="info-card">
        <div class="ic-t">📊 采集进度</div>
        <div class="ic-b" id="progressCard">加载中…</div>
      </div>
    </div>
  </div>
  <div class="tab-content" id="tab-rank"><div class="cards" id="rankCards"></div></div>
  <div class="tab-content" id="tab-flow">
    <div class="placeholder"><span class="big">💰</span>资金流指向 · 第二阶段<br>每条绑定约束 → 被迫资金流方向<br>待矩阵灌入硬数据、瓶颈算出后自动点亮</div>
  </div>
  <div class="tab-content" id="tab-ledger"><div class="ledger-card" style="overflow-x:auto;"><table class="ledger" id="ledgerTable"></table></div></div>
</div>

<div class="tabbar">
  <button data-tab="matrix" class="active"><span class="ic">🗺</span>矩阵</button>
  <button data-tab="rank"><span class="ic">🏆</span>瓶颈榜</button>
  <button data-tab="flow"><span class="ic">💰</span>资金流</button>
  <button data-tab="ledger"><span class="ic">📋</span>台账</button>
</div>

<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="drawer">
  <div class="dh"><h2 id="drawerTitle"></h2><button class="close" id="drawerClose">×</button></div>
  <div class="db" id="drawerBody"></div>
</aside>

<script>
let DATA=null;
function heatColor(score){
  if(score==null) return null;
  const t=Math.max(0,Math.min(1,score/9));
  let r,g,b;
  if(t<0.5){const k=t/0.5;r=Math.round(46+(214-46)*k);g=Math.round(150+(180-150)*k);b=Math.round(70+(70-70)*k);}
  else{const k=(t-0.5)/0.5;r=Math.round(214+(224-214)*k);g=Math.round(180+(88-180)*k);b=Math.round(70+(80-70)*k);}
  return `rgb(${r},${g},${b})`;
}
async function load(){
  const r=await fetch('/api/matrix'); DATA=await r.json();
  renderMeta(); renderMatrix(); renderRank(); renderLedger();
}
function renderMeta(){
  const m=DATA.meta, t=DATA.transparency;
  document.getElementById('metaSub').textContent=`v${m.version} · ${m.factions_count}阵营×${m.dimensions_count}维 · ${m.last_updated}`;
  const total=t.total;
  document.getElementById('tHard').style.width=(t.hard_anchored/total*100)+'%';
  document.getElementById('tSoft').style.width=((t.filled-t.hard_anchored)/total*100)+'%';
  document.getElementById('tEmpty').style.width=(t.empty/total*100)+'%';
  document.getElementById('tLegend').innerHTML=
    `<span><span class="dot" style="background:#3fb950"></span>硬数据 <b>${t.hard_anchored}</b></span>`+
    `<span><span class="dot" style="background:#d4a017"></span>含赋档 <b>${t.filled-t.hard_anchored}</b></span>`+
    `<span><span class="dot" style="background:#28303e"></span>待采集 <b>${t.empty}</b></span>`+
    `<span style="color:var(--dim)">共 ${total} 格 · 已填 <b style="color:var(--text)">${t.fill_pct}%</b></span>`;
  const pc=document.getElementById('progressCard');
  if(pc){
    const layerCount={};DATA.layers.forEach(l=>layerCount[l.id]=0);
    DATA.dimensions.forEach(d=>layerCount[d.layer]++);
    pc.innerHTML=`已采集 <b>${t.filled}</b> / ${total} 格（<b>${t.fill_pct}%</b>）<br>其中硬数据 <b>${t.hard_anchored}</b> 格、含赋档 <b>${t.filled-t.hard_anchored}</b> 格<br><span style="color:var(--dim)">下一步：从硬资源层（能源/粮食/矿产）逐层灌真实数据</span>`;
  }
}
function renderMatrix(){
  const t=document.getElementById('matrixTable');
  const dims=DATA.dimensions, facs=DATA.factions, cells=DATA.cells||{};
  let thead='<thead><tr><th class="corner">阵营 · 维度</th>';
  dims.forEach(d=>{ thead+=`<th title="${d.name} · ${d.source}"><span class="dname">${d.name}</span></th>`; });
  thead+='</tr></thead>';
  let tbody='<tbody>';
  facs.forEach(f=>{
    tbody+=`<tr><th>${f.flag} ${f.name}</th>`;
    dims.forEach(d=>{
      const key=`${f.id}::${d.id}`; const c=cells[key];
      if(c&&c.score!=null){
        tbody+=`<td class="filled" style="background:${heatColor(c.score)}" onclick="openCell('${f.id}','${d.id}')">${c.score.toFixed(1)}</td>`;
      }else{ tbody+=`<td class="empty" title="待采集：点击查看" onclick="openCell('${f.id}','${d.id}')"></td>`; }
    });
    tbody+='</tr>';
  });
  tbody+='</tbody>';
  t.innerHTML=thead+tbody;
}
function renderRank(){
  const box=document.getElementById('rankCards');
  const cells=DATA.cells||{};
  if(Object.keys(cells).length===0){
    box.innerHTML=`<div class="placeholder" style="grid-column:1/-1"><span class="big">🏆</span>阵营瓶颈榜<br>每个阵营的 Top 1–2 绑定约束将在此展示<br>当前矩阵为空，待硬数据灌入后自动生成</div>`;
    return;
  }
  let html='';
  DATA.factions.forEach(f=>{
    const rows=DATA.dimensions.map(d=>({d,c:cells[`${f.id}::${d.id}`]})).filter(x=>x.c&&x.c.score!=null).sort((a,b)=>b.c.score-a.c.score).slice(0,2);
    html+=`<div class="card"><h3>${f.flag} ${f.name}</h3>`;
    if(rows.length===0){html+='<div class="empty-note">待采集</div>';}
    else{rows.forEach(x=>{html+=`<div style="margin-top:8px;font-size:13px;display:flex;justify-content:space-between;"><span>🔴 ${x.d.name}</span><b>${x.c.score.toFixed(1)}</b></div>`;});}
    html+='</div>';
  });
  box.innerHTML=html;
}
function renderLedger(){
  const t=document.getElementById('ledgerTable');
  let html='<thead><tr><th>维度</th><th>层</th><th>硬指标</th><th>一手源</th><th>状态</th></tr></thead><tbody>';
  const layerName={};DATA.layers.forEach(l=>layerName[l.id]=l.name);
  DATA.dimensions.forEach(d=>{
    html+=`<tr><td><b>${d.name}</b></td><td style="color:var(--muted)">${layerName[d.layer]}</td><td style="color:var(--muted)">${d.metric}</td><td class="src">${d.source}</td><td><span class="badge wait">待采集</span></td></tr>`;
  });
  html+='</tbody>';
  t.innerHTML=html;
}
async function openCell(fid,did){
  const r=await fetch(`/api/cell/${fid}/${did}`); const d=await r.json();
  document.getElementById('drawerTitle').textContent=`${d.faction.flag} ${d.faction.name} · ${d.dimension.name}`;
  const body=document.getElementById('drawerBody');
  if(!d.cell){
    body.innerHTML=`<div class="wait-box"><span class="big">📭</span>该格尚未采集数据<br><span style="font-size:11.5px;color:var(--dim)">硬指标：${d.dimension.metric}<br>一手源：${d.dimension.source}</span></div>`;
  }else{
    const c=d.cell;
    const f=(o,cls,tag,name)=>{
      let h=`<div class="factor ${cls}"><div class="fh">${name}<span class="ftag">${tag}</span></div><div class="fval">${o&&o.value!=null?o.value:'—'}</div><div class="fdesc">${o&&o.desc||'—'}</div>`;
      if(o&&o.source){h+=`<div class="fsrc" style="color:var(--dim)">判断口径：${o.source}</div>`;}
      if(o&&o.policy_refs&&o.policy_refs.length){
        h+=`<div class="fsrc">依据文件：`+o.policy_refs.map(p=>`<a href="${p.url}" target="_blank" rel="noopener">${p.label} ↗</a>`).join('<br>')+`</div>`;
      }
      return h+`</div>`;
    };
    // 物理缺口：带二级明细表 + 多源可跳转
    const pg=c.physical_gap||{};
    let pgHtml=`<div class="factor hard"><div class="fh">① 物理缺口<span class="ftag">硬数据</span></div>`+
      `<div class="fval">${pg.value!=null?pg.value:'—'}</div>`+
      `<div class="fdesc">${pg.desc||'—'}</div>`;
    if(pg.breakdown&&pg.breakdown.length){
      const b0=pg.breakdown[0];
      if(b0.mineral!==undefined){
        // 矿产维度：双端(开采/精炼)净地位表
        pgHtml+=`<table class="bd-table"><thead><tr><th>矿产</th><th>开采%</th><th>精炼%</th><th>角色</th><th>权重</th></tr></thead><tbody>`;
        pg.breakdown.forEach(b=>{
          const roleColor=b.net<-0.1?'#3fb950':b.net>0.1?'#e35850':'#d4a017';
          const roleTxt=b.role||(b.net<-0.1?'控制方':b.net>0.1?'依赖方':'自足');
          pgHtml+=`<tr><td>${b.mineral}</td><td>${b.mining_share||0}%</td><td>${b.refining_share||0}%</td>`+
            `<td style="color:${roleColor};font-weight:600">${roleTxt}</td><td>${b.weight.toFixed(1)}</td></tr>`;
        });
        const aces=(pg.aces&&pg.aces.length)?pg.aces.join(' / '):'无';
        pgHtml+=`<tr class="bd-sum"><td>手握王牌</td><td colspan="4" style="text-align:right"><b style="color:#3fb950">${aces}</b>${pg.data_year?` · ${pg.data_year}`:''}</td></tr>`;
        pgHtml+=`</tbody></table>`;
      }else{
        // 能源/粮食/水维度：自给率表
        pgHtml+=`<table class="bd-table"><thead><tr><th>品类</th><th>自给率</th><th>权重</th><th>加权</th></tr></thead><tbody>`;
        pg.breakdown.forEach(b=>{
          const contrib=(b.self_sufficiency*b.weight).toFixed(1);
          const ssColor=b.self_sufficiency>=100?'#3fb950':b.self_sufficiency>=60?'#d4a017':'#e35850';
          pgHtml+=`<tr><td>${b.item}</td><td style="color:${ssColor};font-weight:600">${b.self_sufficiency}%</td><td>${(b.weight*100).toFixed(0)}%</td><td>${contrib}</td></tr>`;
        });
        pgHtml+=`<tr class="bd-sum"><td>加权自给率</td><td colspan="3" style="text-align:right"><b>${pg.self_sufficiency}%</b>${pg.data_year?` · ${pg.data_year}`:''}</td></tr>`;
        pgHtml+=`</tbody></table>`;
      }
    }
    if(pg.note){pgHtml+=`<div class="pg-note">⚠ ${pg.note}</div>`;}
    if(pg.sources&&pg.sources.length){
      pgHtml+=`<div class="fsrc">来源：`+pg.sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${s.label} ↗</a>`).join(' · ')+`</div>`;
    }
    pgHtml+=`</div>`;
    body.innerHTML=
      `<div class="score-big">瓶颈强度 ${c.score.toFixed(2)} <span class="unit">/ 9</span></div>`+
      pgHtml+
      f(c.strategic_relevance,'soft','政策判断','② 战略相关性')+
      f(c.irreplaceability,'soft','半客观','③ 填补难度')+
      f(c.security_amp,'soft','政策判断','④ 安全放大器');
  }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerMask').classList.add('open');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerMask').classList.remove('open');}
document.getElementById('drawerClose').onclick=closeDrawer;
document.getElementById('drawerMask').onclick=closeDrawer;
function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.toggle('active',e.id==='tab-'+name));
  document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
}
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
load();
</script>
</body>
</html>
