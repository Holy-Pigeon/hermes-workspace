<script>
/* ---------- 选择题数据 ---------- */
// correct: 正确选项 key 数组; opts: [key, 文本, 该选项解析]
const singleQs = [
  {no:"Q1", type:"单选", stem:"False sharing（伪共享）的根本原因是？",
   correct:["B"],
   opts:[
     ["A","多线程访问同一个变量","这是真共享，不是伪共享。伪共享的坑在于变量“看起来”不相关。"],
     ["B","不同线程频繁修改位于同一缓存行的不同变量","✔ 两个逻辑上独立的变量落在同一条 64B 缓存行，一个核写就令另一个核的整行失效，缓存一致性协议（MESI）反复来回同步。"],
     ["C","缓存行设置得太大","缓存行大小由硬件固定（通常 64B），不是程序可调的“设置”。"],
     ["D","CPU 核心数量过多","核多会放大伪共享的代价，但不是根因。"]],
   kp:"缓存一致性 / 伪共享：解法是缓存行填充（padding）把热点变量对齐到独立缓存行，或用 @Contended（JVM）/ alignas(64)（C++）。"},

  {no:"Q2", type:"单选", stem:"现代 x86-64 CPU 的缓存行（cache line）大小通常是？",
   correct:["C"],
   opts:[
     ["A","16 字节","过小，非主流架构值。"],
     ["B","32 字节","部分老架构/嵌入式有，x86 主流不是。"],
     ["C","64 字节","✔ x86-64、ARM64 主流均为 64B，是 padding 对齐与预取的基准单位。"],
     ["D","256 字节","部分 CPU 的预取粒度或 L2 spatial prefetch 会到 128B，但单条缓存行不是 256B。"]],
   kp:"内存层级：缓存以“行”为最小传输单位，64B ≈ 8 个 double / 16 个 int。设计数据结构要按 64B 对齐思考。"},

  {no:"Q3", type:"单选", stem:"低延迟交易系统对小报文通常关闭 Nagle 算法（设 TCP_NODELAY），原因是？",
   correct:["B"],
   opts:[
     ["A","Nagle 会加密数据增加开销","Nagle 与加密无关。"],
     ["B","Nagle 会缓冲/合并小包，等待 ACK，引入额外延迟","✔ Nagle 为省带宽会攒小包，未收到前一包 ACK 前不发下一个小包，最坏引入几十 ms 延迟——对报单是致命的。"],
     ["C","Nagle 只在 UDP 下有效","Nagle 是 TCP 机制，UDP 无此算法。"],
     ["D","关闭后能提高吞吐量","关闭是为降延迟，反而可能增加小包数量、降低带宽效率。"]],
   kp:"网络延迟：TCP_NODELAY 关 Nagle。常与关闭 delayed ACK 搭配，避免 Nagle+delayed-ACK 死锁式 40ms 卡顿。"},

  {no:"Q4", type:"单选", stem:"内核旁路（kernel bypass，如 DPDK / Solarflare OpenOnload）主要消除哪部分延迟？",
   correct:["C"],
   opts:[
     ["A","磁盘 I/O 延迟","与磁盘无关。"],
     ["B","CPU 浮点计算延迟","与计算无关。"],
     ["C","系统调用、内核协议栈、中断与数据拷贝开销","✔ 用户态直接操作网卡（poll-mode driver），数据零拷贝进用户空间，绕过内核 TCP/IP 栈与上下文切换。"],
     ["D","GC 停顿","GC 是语言运行时问题，kernel bypass 不解决。"]],
   kp:"低延迟网络栈：DPDK/OpenOnload/RDMA 把收发包从内核搬到用户态，省掉 syscall + 中断 + 拷贝，延迟可从 μs 级降到几百 ns。"},

  {no:"Q5", type:"单选", stem:"LMAX Disruptor 能达到极低延迟的核心机制是？",
   correct:["B"],
   opts:[
     ["A","用互斥锁精细保护队列每个节点","恰恰相反，Disruptor 的卖点是无锁。"],
     ["B","预分配环形缓冲 + 序号栅栏 + 缓存行填充，避免锁与伪共享","✔ RingBuffer 预分配对象（零运行时分配）、用 sequence 递增 + memory barrier 协调生产者消费者、对 sequence 做 padding 防伪共享。"],
     ["C","每个事件动态 new 一个对象再入队","动态分配会触发 GC，正是 Disruptor 极力避免的。"],
     ["D","依赖 JVM GC 自动回收降低延迟","GC 是延迟敌人，Disruptor 通过对象复用规避 GC。"]],
   kp:"无锁队列范式：环形缓冲 + 单写者原则 + CAS/内存屏障 + padding，是低延迟中间件的经典组合。"},

  {no:"Q6", type:"单选", stem:"CAS（Compare-And-Swap）最准确的描述是？",
   correct:["B"],
   opts:[
     ["A","一种操作系统级别的互斥锁","CAS 是硬件指令，不是 OS 锁；它恰恰用于实现无锁。"],
     ["B","一条原子指令，是无锁数据结构的基础","✔ CAS(addr, expected, new)：当内存值等于 expected 时原子替换为 new，否则失败重试。x86 为 CMPXCHG。"],
     ["C","一种垃圾回收算法","无关。"],
     ["D","一种网络拥塞控制协议","无关。"]],
   kp:"原子操作：CAS 是 lock-free 基石，但要防 ABA 问题（值被改回原样导致误判），用版本号/tagged pointer 解决。"},

  {no:"Q7", type:"单选", stem:"关于 busy-polling（忙轮询）与中断驱动，在低延迟场景下的取舍，正确的是？",
   correct:["A"],
   opts:[
     ["A","忙轮询延迟更低但持续占满 CPU","✔ 忙轮询用一个核死循环查数据，省掉中断唤醒/上下文切换，延迟最低，代价是该核 100% 占用、耗电高。HFT 常见做法。"],
     ["B","中断驱动延迟更低且更省 CPU","中断省 CPU 但有唤醒延迟，延迟更高。"],
     ["C","两者延迟相同","不同，忙轮询显著更低。"],
     ["D","忙轮询更省电","忙轮询最费电。"]],
   kp:"延迟 vs 资源权衡：忙轮询以 CPU/功耗换极限延迟，配合线程绑核 + 隔离核（isolcpus）使用。"},

  {no:"Q8", type:"单选", stem:"尾延迟 P99 / P99.9 主要被下列哪类因素放大？",
   correct:["B"],
   opts:[
     ["A","平均 CPU 主频","影响平均延迟，不是尾部抖动的主因。"],
     ["B","GC 停顿、锁竞争、上下文切换、系统抖动（jitter）","✔ 尾延迟本质是“偶发的长停顿”，由这些不确定事件贡献，均值看不出来，必须看分位数。"],
     ["C","硬盘容量","无关。"],
     ["D","显示器刷新率","无关。"]],
   kp:"尾延迟治理：优化 P99 要消灭抖动源——无 GC 设计、无锁、绑核隔核、关中断合并、Huge Page 减 TLB miss。"},

  {no:"Q9", type:"单选", stem:"NUMA 架构下降低内存访问延迟最有效的手段是？",
   correct:["B"],
   opts:[
     ["A","关闭超线程","可能减少争抢，但不解决跨节点访问。"],
     ["B","线程绑核 + 就近的本地节点内存分配","✔ NUMA 下访问远端节点内存延迟高很多；把线程钉在某 socket 并用本地内存（numactl --localalloc / first-touch）避免远程访问。"],
     ["C","增大页表","无直接帮助。"],
     ["D","提高时钟中断频率","反而增加抖动。"]],
   kp:"NUMA 亲和性：绑核 + 本地内存 + first-touch 初始化，避免跨 QPI/UPI 的远程内存访问惩罚。"},

  {no:"Q10", type:"单选", stem:"Little's Law（L=系统内平均请求数，λ=到达率，W=平均驻留时间）的正确表达式是？",
   correct:["C"],
   opts:[
     ["A","L = λ / W","量纲错误。"],
     ["B","W = λ · L","错误变形。"],
     ["C","L = λ · W","✔ 队列/系统的普适稳态关系：在制品 = 吞吐率 × 停留时间。与到达分布无关，极其通用。"],
     ["D","λ = L · W","错误变形。"]],
   kp:"排队论基石：L=λW。已知任意两个可反推第三个，容量规划/延迟估算必用。"},

  {no:"Q11", type:"单选", stem:"掷两枚公平骰子，点数之和为 7 的概率是？",
   correct:["A"],
   opts:[
     ["A","1/6","✔ 和为 7 有 (1,6)(2,5)(3,4)(4,3)(5,2)(6,1) 共 6 种，6/36=1/6。7 是最可能的和。"],
     ["B","1/8","错误。"],
     ["C","5/36","这是和为 6 或 8 的概率。"],
     ["D","1/12","错误。"]],
   kp:"古典概型：样本空间 36，按有利事件计数。和的分布呈三角形，7 为峰值。"},

  {no:"Q12", type:"单选", stem:"泊松分布 Poisson(λ) 的均值和方差分别是？",
   correct:["B"],
   opts:[
     ["A","λ 和 λ²","方差错。"],
     ["B","λ 和 λ","✔ 泊松分布均值=方差=λ，这是其标志性性质（可用来检验数据是否泊松：方差/均值≈1）。"],
     ["C","λ² 和 λ","均值错。"],
     ["D","√λ 和 λ","错误。"]],
   kp:"泊松分布：描述单位时间独立事件计数（订单到达、报文到达）。均值=方差=λ 是判定泊松的经验法则。"}
];

const multiQs = [
  {no:"Q13", type:"多选", stem:"以下哪些手段能有效降低尾延迟（P99）？",
   correct:["A","B","C","E"],
   opts:[
     ["A","内存预分配 / 对象池，避免运行时分配","✔ 消除分配抖动与 GC 触发。"],
     ["B","线程绑核（CPU affinity）","✔ 减少核间迁移与缓存失效、上下文切换。"],
     ["C","使用无锁数据结构减少锁竞争","✔ 锁竞争是尾延迟主要抖动源之一。"],
     ["D","提高 GC 触发频率","✗ 更频繁 GC = 更多停顿，直接恶化尾延迟。"],
     ["E","使用 Huge Pages 减少 TLB miss","✔ 大页降低页表遍历与 TLB miss 抖动。"]],
   kp:"尾延迟优化组合拳：无分配 + 绑核 + 无锁 + 大页。核心是消灭一切“偶发长停顿”。"},

  {no:"Q14", type:"多选", stem:"关于无锁（lock-free）编程，正确的有？",
   correct:["A","B","D"],
   opts:[
     ["A","Lock-free 不等于 wait-free","✔ Lock-free 保证整体有进展（至少一个线程前进），wait-free 更强（每个线程有限步完成）。"],
     ["B","ABA 问题可用版本号 / tagged pointer 解决","✔ 给指针附加版本计数，值改回原样也能被 CAS 识别。"],
     ["C","无锁结构在任何场景下都一定比有锁快","✗ 高竞争下 CAS 反复失败重试，可能比加锁更慢、更耗 CPU。"],
     ["D","内存屏障（memory barrier）用于保证可见性与内存顺序","✔ 防止编译器/CPU 重排导致的可见性错误。"]],
   kp:"无锁语义层级：wait-free ⊂ lock-free ⊂ obstruction-free。无锁不是银弹，要看竞争程度。"},

  {no:"Q15", type:"多选", stem:"以下哪些属于降低网络传输延迟的手段？",
   correct:["A","B","C"],
   opts:[
     ["A","设置 TCP_NODELAY","✔ 关 Nagle，小包立即发。"],
     ["B","在交易所机房 co-location 就近托管","✔ 物理距离决定光速下限，co-lo 把 RTT 压到最低。"],
     ["C","内核旁路（kernel bypass）","✔ 绕过内核协议栈，省 syscall/中断/拷贝。"],
     ["D","单纯把 TCP 发送缓冲区调到最大","✗ 大缓冲提升的是吞吐，反而可能因排队增加延迟（bufferbloat）。"]],
   kp:"网络延迟三板斧：物理就近（co-lo）+ 协议优化（NODELAY）+ 栈旁路（DPDK/RDMA）。"},

  {no:"Q16", type:"多选", stem:"以下哪些做法对缓存友好（cache locality）有正面作用？",
   correct:["A","B","C"],
   opts:[
     ["A","用 SoA 替代 AoS 提升批处理访问局部性","✔ 只遍历某字段时，SoA（数组的结构体）让该字段连续，缓存利用率高。"],
     ["B","顺序访问内存而非随机跳转","✔ 顺序访问命中硬件预取器，随机访问频繁 cache miss。"],
     ["C","软件预取（prefetch）提前加载数据","✔ __builtin_prefetch 在真正用到前把数据拉进缓存。"],
     ["D","把频繁一起访问的字段刻意分散到不同缓存行","✗ 这是反局部性；分散到不同行只用于“防伪共享”的特定写热点字段。"]],
   kp:"缓存局部性：时间局部性 + 空间局部性。数据布局（SoA/AoS）、访问模式、预取共同决定 cache 命中率。"},

  {no:"Q17", type:"多选", stem:"下列哪些会增加上下文切换（context switch）成本？",
   correct:["A","B","C"],
   opts:[
     ["A","线程数远超物理核心数，频繁抢占","✔ 超订阅导致调度器频繁换出换入。"],
     ["B","频繁的阻塞式系统调用","✔ 阻塞 syscall 触发线程让出 CPU，产生切换。"],
     ["C","大量锁竞争导致线程反复挂起/唤醒","✔ 争锁失败→睡眠→被唤醒，每轮都是切换。"],
     ["D","线程全程绑核且忙轮询不阻塞","✗ 这正是避免切换的做法，不产生切换成本。"]],
   kp:"上下文切换代价：保存/恢复寄存器 + TLB/缓存冷启动，约几 μs。低延迟系统追求“一线程一核、不阻塞、不切换”。"}
];

/* ---------- 计算/填空题数据 ---------- */
const calcQs = [

/* ---------- 渲染 ---------- */
function renderChoice(q){
  const opts = q.opts.map(o=>{
    const isC = q.correct.includes(o[0]);
    return `<li class="${isC?'correct':''}">
      <span class="opt-key">${o[0]}.</span>${o[1]}
      <span class="opt-exp">${o[2]}</span></li>`;
  }).join("");
  return `<div class="q">
    <div class="q-head">
      <span class="q-no">${q.no}</span>
      <span class="q-type">${q.type}</span>
      <span class="q-body">${q.stem}</span>
    </div>
    <details>
      <summary>查看答案与逐项解析</summary>
      <div class="reveal">
        <div class="ans-tag">正确答案：${q.correct.join(" ")}</div>
        <ul class="opts">${opts}</ul>
        <div class="kp"><b>📚 知识点：</b>${q.kp}</div>
      </div>
    </details>
  </div>`;
}

function renderCalc(q){
  const steps = q.steps.map(s=>`<div class="step">• ${s}</div>`).join("");
  const warn = q.warn ? `<div class="warn">💡 ${q.warn}</div>` : "";
  return `<div class="q">
    <div class="q-head">
      <span class="q-no">${q.no}</span>
      <span class="q-type">${q.type}</span>
      <span class="q-body">${q.stem}</span>
    </div>
    <details>
      <summary>查看原理公式与推导过程</summary>
      <div class="reveal">
        <div class="answer-box">
          <div class="ans-tag">答案：${q.ans}</div>
          <div class="formula">原理 / 公式：\n${q.principle}</div>
          <div style="margin-top:8px"><b>推导过程：</b></div>
          ${steps}
          ${warn}
        </div>
      </div>
    </details>
  </div>`;
}

document.getElementById("single").innerHTML = singleQs.map(renderChoice).join("");
document.getElementById("multi").innerHTML  = multiQs.map(renderChoice).join("");
document.getElementById("calc").innerHTML   = calcQs.map(renderCalc).join("");

function toggleAll(open){
  document.querySelectorAll("details").forEach(d=>d.open=open);
}
